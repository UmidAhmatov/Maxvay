services:
  web:
    build: .
    command: >
      sh -c "python django_app/manage.py migrate &&
             python django_app/manage.py seed_maxway &&
             python django_app/manage.py collectstatic --noinput &&
             gunicorn maxway.wsgi:application --chdir django_app --bind 0.0.0.0:8000 --workers 3 --timeout 60"
    env_file:
      - path: .env
        required: false
    environment:
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-maxway-change-this-secret-before-production}"
      DJANGO_DEBUG: "${DJANGO_DEBUG:-0}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-127.0.0.1,localhost}"
      DJANGO_CSRF_TRUSTED_ORIGINS: "${DJANGO_CSRF_TRUSTED_ORIGINS:-http://127.0.0.1,http://localhost}"
      DJANGO_DB_PATH: "${DJANGO_DB_PATH:-/app/data/maxway_django.sqlite3}"
      DJANGO_CREATE_DEMO_ADMIN: "${DJANGO_CREATE_DEMO_ADMIN:-1}"
      DJANGO_SUPERUSER_USERNAME: "${DJANGO_SUPERUSER_USERNAME:-admin}"
      DJANGO_SUPERUSER_PASSWORD: "${DJANGO_SUPERUSER_PASSWORD:-admin12345}"
      DJANGO_SUPERUSER_EMAIL: "${DJANGO_SUPERUSER_EMAIL:-admin@maxway.local}"
    expose:
      - "8000"
    volumes:
      - maxway_data:/app/data
      - maxway_static:/app/django_app/staticfiles
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - maxway_static:/app/staticfiles:ro
    restart: unless-stopped

volumes:
  maxway_data:
  maxway_static:
